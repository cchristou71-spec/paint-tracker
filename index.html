<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paint Tracker">
<meta name="theme-color" content="#1A1612">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Paint Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --paper: #EDE8DC;
    --warm-white: #FAF8F4;
    --ink: #1A1612;
    --mid: #6B6156;
    --light: #C4B8A8;
    --accent: #C4521A;
    --accent-light: #E8D5C8;
    --green: #3D6B4F;
    --green-light: #C8DDD0;
    --border: #D4CBC0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: calc(16px + var(--safe-top)) 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    letter-spacing: 0.01em;
  }
  header h1 span { color: var(--accent); font-style: italic; }

  /* ── Tab bar (mobile nav) ── */
  .tab-bar {
    background: var(--ink);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-icon { font-size: 1.1rem; line-height: 1; }

  /* ── Body layout ── */
  .app-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Desktop: side-by-side */
  @media (min-width: 700px) {
    .tab-bar { display: none; }
    .sidebar { display: flex !important; }
    .main { display: block !important; }
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 180px;
    background: var(--paper);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .room-list { overflow-y: auto; flex: 1; padding: 8px; }
  .room-item {
    padding: 10px 12px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 2px;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .room-item:hover { background: var(--cream); }
  .room-item.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .room-item.active .room-count { background: var(--accent); color: #fff; }
  .room-name { font-size: 0.875rem; font-weight: 500; flex: 1; min-width: 0; word-break: break-word; }
  .room-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    background: var(--border);
    color: var(--mid);
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .room-actions { display: none; gap: 2px; }
  .room-item:hover .room-actions,
  .room-item.active .room-actions { display: flex; }
  .room-edit-btn, .room-del-btn {
    background: none; border: none; cursor: pointer;
    padding: 3px 5px; border-radius: 2px;
    font-size: 0.75rem; line-height: 1;
    transition: background 0.1s; color: inherit; opacity: 0.6;
  }
  .room-edit-btn:hover, .room-del-btn:hover { opacity: 1; background: rgba(0,0,0,0.1); }

  /* ── Main ── */
  .main { flex: 1; overflow-y: auto; padding: 20px; }

  /* Mobile panels */
  @media (max-width: 699px) {
    .sidebar { width: 100%; border-right: none; }
    .main { padding: 16px; }
    body { overflow: hidden; }
    .panel { display: none; }
    .panel.visible { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .sidebar.panel.visible { width: 100%; }
    .main.panel.visible { overflow-y: auto; }
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60%;
    gap: 10px;
    color: var(--mid);
    text-align: center;
    padding: 20px;
  }
  .empty-icon { font-size: 3rem; }
  .empty-state h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--ink); }
  .empty-state p { font-size: 0.875rem; max-width: 260px; }

  /* ── Room view ── */
  .room-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px;
  }
  .room-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; }
  .room-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .back-btn {
    display: none;
    background: none;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    color: var(--accent);
    padding: 4px 2px;
    margin-right: 4px;
  }
  @media (max-width: 699px) { .back-btn { display: inline; } }

  /* ── Surface sections ── */
  .surface-section { margin-bottom: 24px; }
  .surface-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .surface-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
    border-bottom: 2px solid var(--border);
    padding-bottom: 5px;
    flex: 1;
  }

  /* ── Paint cards ── */
  .paint-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  @media (max-width: 699px) {
    .paint-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
  }
  .paint-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .paint-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .paint-swatch { height: 64px; position: relative; }
  .paint-swatch-inner { width: 100%; height: 100%; }
  .swatch-actions {
    position: absolute; top: 5px; right: 5px;
    display: flex; gap: 3px;
    opacity: 0; transition: opacity 0.15s;
  }
  .paint-card:hover .swatch-actions,
  .paint-card:focus-within .swatch-actions { opacity: 1; }
  /* Always show on touch devices */
  @media (hover: none) { .swatch-actions { opacity: 1; } }
  .swatch-btn {
    background: rgba(255,255,255,0.92);
    border: none; border-radius: 3px;
    width: 26px; height: 26px;
    cursor: pointer; font-size: 0.72rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .swatch-btn:hover { background: #fff; }
  .paint-info { padding: 9px 11px; }
  .paint-colour-name { font-weight: 500; font-size: 0.875rem; margin-bottom: 2px; }
  .paint-brand {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; color: var(--mid);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .paint-type {
    display: inline-block; margin-top: 5px;
    background: var(--paper); color: var(--mid);
    font-family: 'DM Mono', monospace; font-size: 0.58rem;
    padding: 2px 7px; border-radius: 20px; letter-spacing: 0.04em;
  }
  .paint-notes { font-size: 0.72rem; color: var(--mid); margin-top: 5px; }
  .paint-links {
    display: flex; gap: 6px;
    padding: 7px 10px;
    border-top: 1px solid var(--border);
  }
  .paint-link {
    font-family: 'DM Mono', monospace; font-size: 0.58rem;
    letter-spacing: 0.05em; text-transform: uppercase;
    text-decoration: none; color: var(--accent);
    padding: 4px 8px;
    border: 1px solid var(--accent-light);
    border-radius: 3px;
    transition: background 0.1s, color 0.1s;
    flex: 1; text-align: center;
  }
  .paint-link:hover { background: var(--accent); color: #fff; }
  .paint-link.disabled { color: var(--light); border-color: var(--border); pointer-events: none; }

  .add-paint-card {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 6px; min-height: 120px;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; color: var(--light);
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.06em; text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .add-paint-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .add-paint-plus { font-size: 1.3rem; line-height: 1; }

  /* ── Buttons ── */
  .btn {
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    border: none; border-radius: 3px; cursor: pointer;
    padding: 9px 14px; transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--paper); color: var(--ink); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--cream); border: 1px solid rgba(255,255,255,0.3); }
  .btn-danger { background: #c0392b; color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 0.62rem; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,22,18,0.6);
    z-index: 200; align-items: flex-end; justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--warm-white);
    border-radius: 14px 14px 0 0;
    width: 100%; max-width: 520px;
    max-height: 92dvh;
    overflow-y: auto;
    padding-bottom: var(--safe-bottom);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; padding: 16px; }
    .modal { border-radius: 10px; }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
  }
  @media (min-width: 600px) { .modal-handle { display: none; } }
  .modal-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; }
  .modal-close {
    background: none; border: none; cursor: pointer;
    font-size: 1.1rem; color: var(--mid); padding: 4px;
  }
  .modal-body { padding: 16px 20px; }
  .modal-footer {
    padding: 10px 20px 16px;
    display: flex; justify-content: flex-end; gap: 10px;
    border-top: 1px solid var(--border);
  }

  /* ── Form ── */
  .field { margin-bottom: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label {
    display: block;
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--mid); margin-bottom: 5px;
  }
  input[type=text], input[type=url], input[type=color], select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--warm-white);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    color: var(--ink); outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--ink); }
  input[type=color] { height: 44px; padding: 4px 6px; cursor: pointer; }
  .color-row { display: flex; gap: 10px; align-items: flex-end; }
  .color-row .field { flex: 1; margin-bottom: 0; }
  .color-preview {
    width: 44px; height: 44px;
    border-radius: 4px; border: 1px solid var(--border);
    flex-shrink: 0; transition: background 0.2s;
  }

  /* ── Tag editor ── */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag {
    display: flex; align-items: center; gap: 4px;
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 3px; padding: 4px 9px;
    font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.04em;
  }
  .tag-del {
    background: none; border: none; cursor: pointer;
    color: var(--mid); font-size: 0.8rem; padding: 0; line-height: 1;
  }
  .tag-del:hover { color: #c0392b; }
  .tag-input-row { display: flex; gap: 8px; }
  .tag-input-row input { flex: 1; }
  .tag-hint { font-size: 0.68rem; color: var(--mid); margin-top: 6px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ── Install banner ── */
  .install-banner {
    display: none;
    background: var(--green);
    color: #fff;
    padding: 10px 16px;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 0.8rem;
    flex-shrink: 0;
  }
  .install-banner.show { display: flex; }
  .install-banner button {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff; border-radius: 3px;
    padding: 5px 12px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
  }
  .install-dismiss { background: none !important; border: none !important; opacity: 0.6; font-size: 1rem !important; padding: 0 4px !important; }
</style>
</head>
<body>

<header>
  <h1>Paint <span>Tracker</span></h1>
  <button class="btn btn-ghost btn-sm" onclick="openRoomModal()">+ Room</button>
</header>

<div class="install-banner" id="installBanner">
  <span>📲 Add to Home Screen for the best experience</span>
  <button onclick="doInstall()">Install</button>
  <button class="install-dismiss" onclick="dismissInstall()">✕</button>
</div>

<div class="app-body">
  <!-- Sidebar / Rooms panel -->
  <aside class="sidebar panel" id="sidebarPanel">
    <div class="sidebar-header">
      <span class="sidebar-label">Rooms</span>
    </div>
    <div class="room-list" id="roomList"></div>
    <div style="padding:12px">
      <button class="btn btn-primary" style="width:100%" onclick="openRoomModal()">+ Add Room</button>
    </div>
  </aside>

  <!-- Main / Room detail panel -->
  <main class="main panel" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎨</div>
      <h2>No room selected</h2>
      <p>Add a room to start tracking your paints.</p>
      <button class="btn btn-primary" style="margin-top:8px" onclick="openRoomModal()">Add first room</button>
    </div>
    <div id="roomView" style="display:none"></div>
  </main>
</div>

<!-- Tab bar (mobile only) -->
<nav class="tab-bar" id="tabBar">
  <button class="tab-btn active" id="tabRooms" onclick="showTab('rooms')">
    <span class="tab-icon">🏠</span>Rooms
  </button>
  <button class="tab-btn" id="tabDetail" onclick="showTab('detail')" id="tabDetail">
    <span class="tab-icon">🎨</span>Paints
  </button>
</nav>

<!-- Room Modal -->
<div class="modal-overlay" id="roomModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="roomModalTitle">New Room</span>
      <button class="modal-close" onclick="closeModal('roomModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Room Name</label>
        <input type="text" id="roomNameInput" placeholder="e.g. Living Room, Master Bedroom…">
      </div>
      <div class="field">
        <label>Surfaces</label>
        <div class="tag-list" id="surfaceTagList"></div>
        <div class="tag-input-row">
          <input type="text" id="surfaceTagInput" placeholder="e.g. Wall, Ceiling, Door…" onkeydown="surfaceTagKeydown(event)">
          <button class="btn btn-secondary btn-sm" onclick="addSurfaceTag()">Add</button>
        </div>
        <p class="tag-hint">Tap Add or press Enter. Suggestions: Wall · Ceiling · Door · Wardrobe · Wood Panel · Skirting</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('roomModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRoom()">Save Room</button>
    </div>
  </div>
</div>

<!-- Paint Modal -->
<div class="modal-overlay" id="paintModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="paintModalTitle">Add Paint</span>
      <button class="modal-close" onclick="closeModal('paintModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>Brand</label>
          <input type="text" id="paintBrand" placeholder="Farrow & Ball">
        </div>
        <div class="field">
          <label>Colour Name</label>
          <input type="text" id="paintColour" placeholder="Elephant's Breath">
        </div>
      </div>
      <div class="field">
        <label>Type / Finish</label>
        <input type="text" id="paintType" placeholder="Matt Emulsion · Eggshell · Gloss · Satinwood…">
      </div>
      <div class="field">
        <label>Colour Sample</label>
        <div class="color-row">
          <div class="field">
            <input type="color" id="paintColorPicker" value="#FFFFFF" oninput="updateColorPreview(this.value)">
          </div>
          <div class="color-preview" id="colorPreview" style="background:#FFFFFF"></div>
          <div class="field" style="flex:2">
            <input type="text" id="paintColorHex" placeholder="#FFFFFF" oninput="syncColorHex(this.value)" style="font-family:'DM Mono',monospace;font-size:0.85rem">
          </div>
        </div>
      </div>
      <div class="field">
        <label>Colour / Product Page URL</label>
        <input type="url" id="paintColourUrl" placeholder="https://…">
      </div>
      <div class="field">
        <label>Buy / Price Check URL</label>
        <input type="url" id="paintBuyUrl" placeholder="https://…">
      </div>
      <div class="field">
        <label>Notes <span style="font-size:0.65rem;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="paintNotes" placeholder="e.g. Two coats, used 2.5L">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('paintModal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePaint()">Save Paint</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Confirm Delete</span>
      <button class="modal-close" onclick="closeModal('confirmModal')">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirmText" style="font-size:0.9rem;line-height:1.6;color:var(--mid)"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn btn-danger" id="confirmBtn">Delete</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let data = JSON.parse(localStorage.getItem('paintTracker') || '{"rooms":[]}');
let selectedRoomId = null;
let editingRoomId = null;
let editingPaintId = null;
let paintContext = null;
let tempSurfaces = [];
let deferredInstall = null;
let isMobile = () => window.innerWidth < 700;

function save() { localStorage.setItem('paintTracker', JSON.stringify(data)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── PWA install ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  if (!localStorage.getItem('installDismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
});
function doInstall() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(() => {
    deferredInstall = null;
    document.getElementById('installBanner').classList.remove('show');
  });
}
function dismissInstall() {
  localStorage.setItem('installDismissed', '1');
  document.getElementById('installBanner').classList.remove('show');
}

// ── Mobile tabs ──
function showTab(tab) {
  const sidebar = document.getElementById('sidebarPanel');
  const main = document.getElementById('mainPanel');
  const tabRooms = document.getElementById('tabRooms');
  const tabDetail = document.getElementById('tabDetail');
  if (!isMobile()) return;
  if (tab === 'rooms') {
    sidebar.classList.add('visible'); main.classList.remove('visible');
    tabRooms.classList.add('active'); tabDetail.classList.remove('active');
  } else {
    main.classList.add('visible'); sidebar.classList.remove('visible');
    tabRooms.classList.remove('active'); tabDetail.classList.add('active');
  }
}

function initPanels() {
  const sidebar = document.getElementById('sidebarPanel');
  const main = document.getElementById('mainPanel');
  if (isMobile()) {
    sidebar.classList.add('visible');
    main.classList.remove('visible');
  } else {
    sidebar.classList.remove('visible');
    main.classList.remove('visible');
  }
}

// ── Sidebar ──
function renderSidebar() {
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  if (!data.rooms.length) {
    list.innerHTML = '<p style="padding:16px 12px;font-size:0.8rem;color:var(--light);text-align:center">No rooms yet</p>';
    return;
  }
  data.rooms.forEach(room => {
    const paintCount = Object.values(room.surfaces || {}).flat().length;
    const el = document.createElement('div');
    el.className = 'room-item' + (room.id === selectedRoomId ? ' active' : '');
    el.innerHTML = `
      <span class="room-name">${room.name}</span>
      <span class="room-count">${paintCount}</span>
      <span class="room-actions">
        <button class="room-edit-btn" onclick="event.stopPropagation();openRoomModal('${room.id}')">✎</button>
        <button class="room-del-btn" onclick="event.stopPropagation();confirmDeleteRoom('${room.id}')">✕</button>
      </span>`;
    el.addEventListener('click', () => selectRoom(room.id));
    list.appendChild(el);
  });
}

function selectRoom(id) {
  selectedRoomId = id;
  renderSidebar();
  renderRoom();
  if (isMobile()) showTab('detail');
}

// ── Room view ──
function renderRoom() {
  const empty = document.getElementById('emptyState');
  const view = document.getElementById('roomView');
  const room = data.rooms.find(r => r.id === selectedRoomId);
  if (!room) { empty.style.display = 'flex'; view.style.display = 'none'; return; }
  empty.style.display = 'none'; view.style.display = 'block';

  const surfaces = Object.keys(room.surfaces || {});
  const totalPaints = Object.values(room.surfaces || {}).flat().length;

  let html = `
    <div class="room-header">
      <div>
        <div style="display:flex;align-items:center;gap:4px">
          <button class="back-btn" onclick="showTab('rooms')">‹</button>
          <div class="room-title">${room.name}</div>
        </div>
        <div class="room-subtitle">${surfaces.length} surface${surfaces.length!==1?'s':''} · ${totalPaints} paint record${totalPaints!==1?'s':''}</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="openRoomModal('${room.id}')">Edit Room</button>
    </div>`;

  if (!surfaces.length) {
    html += `<p style="color:var(--mid);font-size:0.875rem;padding:8px 0">No surfaces added yet — tap Edit Room to add Wall, Ceiling etc.</p>`;
  }

  surfaces.forEach(surface => {
    const paints = room.surfaces[surface] || [];
    html += `
      <div class="surface-section">
        <div class="surface-heading">
          <div class="surface-name">${surface}</div>
        </div>
        <div class="paint-grid">
          ${paints.map(p => paintCardHtml(p, room.id, surface)).join('')}
          <button class="add-paint-card" onclick="openPaintModal('${room.id}','${esc(surface)}')">
            <span class="add-paint-plus">+</span>
            <span>Add paint</span>
          </button>
        </div>
      </div>`;
  });

  view.innerHTML = html;
}

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function paintCardHtml(p, roomId, surface) {
  const colourLink = p.colourUrl
    ? `<a href="${p.colourUrl}" target="_blank" class="paint-link">🎨 Colour</a>`
    : `<span class="paint-link disabled">🎨 Colour</span>`;
  const buyLink = p.buyUrl
    ? `<a href="${p.buyUrl}" target="_blank" class="paint-link">🛒 Buy</a>`
    : `<span class="paint-link disabled">🛒 Buy</span>`;
  return `
    <div class="paint-card">
      <div class="paint-swatch">
        <div class="paint-swatch-inner" style="background:${p.color||'#CCC'}"></div>
        <div class="swatch-actions">
          <button class="swatch-btn" onclick="openPaintModal('${roomId}','${esc(surface)}','${p.id}')">✎</button>
          <button class="swatch-btn" onclick="confirmDeletePaint('${roomId}','${esc(surface)}','${p.id}')">✕</button>
        </div>
      </div>
      <div class="paint-info">
        <div class="paint-colour-name">${p.colour}</div>
        <div class="paint-brand">${p.brand}</div>
        ${p.type ? `<span class="paint-type">${p.type}</span>` : ''}
        ${p.notes ? `<div class="paint-notes">${p.notes}</div>` : ''}
      </div>
      <div class="paint-links">${colourLink}${buyLink}</div>
    </div>`;
}

// ── Room Modal ──
function openRoomModal(id) {
  editingRoomId = id || null;
  const room = id ? data.rooms.find(r => r.id === id) : null;
  document.getElementById('roomModalTitle').textContent = room ? 'Edit Room' : 'New Room';
  document.getElementById('roomNameInput').value = room ? room.name : '';
  tempSurfaces = room ? Object.keys(room.surfaces || {}) : [];
  renderSurfaceTags();
  document.getElementById('roomModal').classList.add('open');
  setTimeout(() => document.getElementById('roomNameInput').focus(), 100);
}

function renderSurfaceTags() {
  document.getElementById('surfaceTagList').innerHTML =
    tempSurfaces.map((s, i) => `<span class="tag">${s}<button class="tag-del" onclick="removeSurfaceTag(${i})">✕</button></span>`).join('');
}

function addSurfaceTag() {
  const inp = document.getElementById('surfaceTagInput');
  const val = inp.value.trim();
  if (val && !tempSurfaces.includes(val)) { tempSurfaces.push(val); renderSurfaceTags(); }
  inp.value = ''; inp.focus();
}
function removeSurfaceTag(i) { tempSurfaces.splice(i,1); renderSurfaceTags(); }
function surfaceTagKeydown(e) { if (e.key==='Enter') { e.preventDefault(); addSurfaceTag(); } }

function saveRoom() {
  const name = document.getElementById('roomNameInput').value.trim();
  if (!name) { document.getElementById('roomNameInput').focus(); return; }
  if (editingRoomId) {
    const room = data.rooms.find(r => r.id === editingRoomId);
    room.name = name;
    const ns = {};
    tempSurfaces.forEach(s => { ns[s] = room.surfaces[s] || []; });
    room.surfaces = ns;
  } else {
    const surfaces = {};
    tempSurfaces.forEach(s => { surfaces[s] = []; });
    const newRoom = { id: uid(), name, surfaces };
    data.rooms.push(newRoom);
    selectedRoomId = newRoom.id;
  }
  save(); closeModal('roomModal'); renderSidebar(); renderRoom();
  if (isMobile()) showTab('detail');
}

// ── Paint Modal ──
function openPaintModal(roomId, surface, paintId) {
  paintContext = { roomId, surface };
  editingPaintId = paintId || null;
  const room = data.rooms.find(r => r.id === roomId);
  const paint = paintId ? (room.surfaces[surface]||[]).find(p=>p.id===paintId) : null;
  document.getElementById('paintModalTitle').textContent = paint ? `Edit — ${surface}` : `Add Paint — ${surface}`;
  document.getElementById('paintBrand').value = paint?.brand || '';
  document.getElementById('paintColour').value = paint?.colour || '';
  document.getElementById('paintType').value = paint?.type || '';
  document.getElementById('paintColourUrl').value = paint?.colourUrl || '';
  document.getElementById('paintBuyUrl').value = paint?.buyUrl || '';
  document.getElementById('paintNotes').value = paint?.notes || '';
  const color = paint?.color || '#F5F0E8';
  document.getElementById('paintColorPicker').value = color;
  document.getElementById('paintColorHex').value = color;
  document.getElementById('colorPreview').style.background = color;
  document.getElementById('paintModal').classList.add('open');
  setTimeout(() => document.getElementById('paintBrand').focus(), 100);
}

function updateColorPreview(val) {
  document.getElementById('colorPreview').style.background = val;
  document.getElementById('paintColorHex').value = val;
}
function syncColorHex(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    document.getElementById('paintColorPicker').value = val;
    document.getElementById('colorPreview').style.background = val;
  }
}

function savePaint() {
  const brand = document.getElementById('paintBrand').value.trim();
  const colour = document.getElementById('paintColour').value.trim();
  if (!brand) { document.getElementById('paintBrand').focus(); return; }
  if (!colour) { document.getElementById('paintColour').focus(); return; }
  const paint = {
    id: editingPaintId || uid(), brand, colour,
    type: document.getElementById('paintType').value.trim(),
    color: document.getElementById('paintColorPicker').value,
    colourUrl: document.getElementById('paintColourUrl').value.trim(),
    buyUrl: document.getElementById('paintBuyUrl').value.trim(),
    notes: document.getElementById('paintNotes').value.trim(),
  };
  const room = data.rooms.find(r => r.id === paintContext.roomId);
  if (!room.surfaces[paintContext.surface]) room.surfaces[paintContext.surface] = [];
  if (editingPaintId) {
    const idx = room.surfaces[paintContext.surface].findIndex(p=>p.id===editingPaintId);
    if (idx > -1) room.surfaces[paintContext.surface][idx] = paint;
  } else {
    room.surfaces[paintContext.surface].push(paint);
  }
  save(); closeModal('paintModal'); renderSidebar(); renderRoom();
}

// ── Delete ──
function confirmDeleteRoom(id) {
  const room = data.rooms.find(r => r.id === id);
  document.getElementById('confirmText').textContent = `Delete "${room.name}" and all its paint records? This cannot be undone.`;
  document.getElementById('confirmBtn').onclick = () => deleteRoom(id);
  document.getElementById('confirmModal').classList.add('open');
}
function deleteRoom(id) {
  data.rooms = data.rooms.filter(r => r.id !== id);
  if (selectedRoomId === id) { selectedRoomId = null; if (isMobile()) showTab('rooms'); }
  save(); closeModal('confirmModal'); renderSidebar(); renderRoom();
}
function confirmDeletePaint(roomId, surface, paintId) {
  const room = data.rooms.find(r => r.id === roomId);
  const paint = (room.surfaces[surface]||[]).find(p=>p.id===paintId);
  document.getElementById('confirmText').textContent = `Remove "${paint.colour}" by ${paint.brand} from ${surface}?`;
  document.getElementById('confirmBtn').onclick = () => deletePaint(roomId, surface, paintId);
  document.getElementById('confirmModal').classList.add('open');
}
function deletePaint(roomId, surface, paintId) {
  const room = data.rooms.find(r => r.id === roomId);
  room.surfaces[surface] = (room.surfaces[surface]||[]).filter(p=>p.id!==paintId);
  save(); closeModal('confirmModal'); renderSidebar(); renderRoom();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Init ──
initPanels();
renderSidebar();
renderRoom();
window.addEventListener('resize', initPanels);
</script>
</body>
</html>
